  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      background: #ffffff;
      color: #1e293b;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .nav-link {
      position: relative;
      transition: all 0.3s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .policy-section {
      scroll-margin-top: 120px;
      transition: all 0.3s ease;
    }
    .policy-section:target {
      animation: highlight 1s ease;
    }
    @keyframes highlight {
      0% { background-color: rgba(99, 102, 241, 0.1); }
      100% { background-color: transparent; }
    }
    .toc-link {
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }
    .toc-link:hover, .toc-link.active {
      border-left-color: #6366f1;
      color: #6366f1;
      background: rgba(99, 102, 241, 0.05);
    }
    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .footer-link {
      transition: all 0.2s ease;
    }
    .footer-link:hover {
      color: #6366f1;
      transform: translateX(4px);
    }
  </style>
</head>
<body class="antialiased">
  <!-- Header -->
  <header id="header" class="fixed w-full top-0 z-50 transition-all duration-300 glass-effect border-b border-slate-200/60">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16 md:h-20">
        <a href="../index.html" class="flex items-center space-x-2">
          <div class="flex items-center gap-3">
            <img src="../logo.png" class="w-20">
            <span class="text-xl font-bold tracking-tight hidden sm:block">Webokraft <br> Solutions</span>
        </div>
        </a>
        
      

        <div class="hidden lg:flex items-center space-x-4">
          <a href="#" class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold shadow-lg shadow-indigo-500/30 hover:shadow-xl hover:shadow-indigo-500/40 transition-all duration-300 hover:-translate-y-0.5">
            Get Started
          </a>
        </div>

      </div>
    </div>

    <!-- Mobile Menu -->
    
  </header>

  <!-- Hero Section -->
  <section class="pt-32 pb-12 md:pt-40 md:pb-16 bg-gradient-to-br from-indigo-50 via-violet-50 to-pink-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center max-w-3xl mx-auto">
        <div class="inline-flex items-center px-4 py-2 rounded-full bg-white/80 backdrop-blur-sm border border-indigo-200 text-sm font-medium text-indigo-700 mb-6">
          <i class="fas fa-shield-alt mr-2"></i>
          Last Updated: July 1, 2026
        </div>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 mb-6 leading-tight">
          Our <span class="gradient-text">Portfolio</span>
        </h1>
        <p class="text-lg md:text-xl text-slate-600 leading-relaxed">
          Explore how we've helped companies automate operations, launch products, and scale revenue with intelligent technology.
        </p>
      </div>
    </div>
  </section>
  <div class="max-w-7xl my-10 mx-auto px-4 sm:px-6 lg:px-8">

    <div
        id="portfolioGrid"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
    ></div>
  </div>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="fixed bottom-8 right-8 w-12 h-12 rounded-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg shadow-indigo-500/30 hover:shadow-xl hover:shadow-indigo-500/40 transition-all duration-300 hover:-translate-y-1 opacity-0 pointer-events-none z-40">
    <i class="fas fa-arrow-up"></i>
  </button>

    <script src="script.js" ></script>

  <script>
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    
    mobileMenuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // Header Scroll Effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('shadow-md');
      } else {
        header.classList.remove('shadow-md');
      }
    });

    // Back to Top Button
    const backToTopBtn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTopBtn.classList.remove('opacity-0', 'pointer-events-none');
      } else {
        backToTopBtn.classList.add('opacity-0', 'pointer-events-none');
      }
    });

    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Active TOC Link Highlighting
    const sections = document.querySelectorAll('.policy-section');
    const tocLinks = document.querySelectorAll('.toc-link');

    window.addEventListener('scroll', () => {
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        if (window.scrollY >= sectionTop - 150) {
          current = section.getAttribute('id');
        }
      });

      tocLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    });

    // Smooth Scroll for TOC Links
    tocLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href');
        const targetSection = document.querySelector(targetId);
        if (targetSection) {
          const headerOffset = 120;
          const elementPosition = targetSection.offsetTop;
          const offsetPosition = elementPosition - headerOffset;
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }
      });
    });
  </script>
